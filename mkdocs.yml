site_name: vibecheck-tdd
site_url: https://brandonapol.github.io/vibecheck/
site_description: A CI-native test integrity pipeline that prevents AI coding agents from gaming their own test suites.
repo_url: https://github.com/brandonapol/vibecheck
repo_name: brandonapol/vibecheck
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - CLI Reference: cli.md
  - Analyzers:
      - Overview: analyzers/index.md
      - Mutation Testing: analyzers/mutation.md
      - Semantic Diff: analyzers/semantic-diff.md
      - Config Weakening: analyzers/config-weakening.md
  - Scoring: scoring.md
  - Pre-commit Hook: pre-commit.md
  - CI Integration: ci.md
  - CLAUDE.md Template: claude-template.md
  - Adversarial Testing: adversarial.md
  - API Reference: api.md
